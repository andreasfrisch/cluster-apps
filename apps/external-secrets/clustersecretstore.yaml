apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: onepassword
spec:
  provider:
    onepassword:
      # Service URL of the Connect server deployed in the cluster
      connectHost: http://onepassword-connect.external-secrets.svc.cluster.local:8080
      vaults:
        # Key: your vault name in 1Password, Value: priority (1 = highest)
        k8s-secrets: 1
      auth:
        secretRef:
          connectTokenSecretRef:
            # Name of the secret created during bootstrap:
            # kubectl create secret generic onepassword-connect-token \
            #   --from-literal=token=<your-access-token> -n external-secrets
            name: onepassword-connect-token
            namespace: external-secrets
            key: token
