apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: onepassword-connect
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://1password.github.io/connect-helm-charts
    chart: connect
    targetRevision: 1.15.0
    helm:
      values: |
        connect:
          # Name of the secret created during bootstrap
          # kubectl create secret generic onepassword-connect-credentials \
          #   --from-file=1password-credentials.json -n external-secrets
          credentialsName: onepassword-connect-credentials
        operator:
          # Using ESO instead of the 1Password operator
          create: false

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
